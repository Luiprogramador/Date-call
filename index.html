<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Especial 💖</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dark-pink': {
                            900: '#12080a',
                            800: '#1a0f12',
                            700: '#2b1820',
                            600: '#3d2029',
                        },
                        'accent': {
                            DEFAULT: '#ff6b8b',
                            light: '#f3a6c0',
                            glow: '#ff8fa8',
                        }
                    },
                    fontFamily: {
                        'sans': ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'confetti-fall': 'confettiFall 3s ease-out forwards',
                        'fade-in': 'fadeIn 0.8s ease-out',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1)',
                        'bounce-in': 'bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                    },
                    keyframes: {
                        pulseGlow: {
                            '0%, 100%': {
                                boxShadow: '0 0 15px rgba(255, 107, 139, 0.4), 0 0 30px rgba(255, 107, 139, 0.15)',
                                transform: 'scale(1)'
                            },
                            '50%': {
                                boxShadow: '0 0 25px rgba(255, 107, 139, 0.7), 0 0 50px rgba(255, 107, 139, 0.35), 0 0 70px rgba(255, 107, 139, 0.2)',
                                transform: 'scale(1.04)'
                            },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-8px)' },
                        },
                        confettiFall: {
                            '0%': { transform: 'translateY(-120vh) rotate(0deg)', opacity: '1' },
                            '80%': { opacity: '1' },
                            '100%': { transform: 'translateY(110vh) rotate(720deg)', opacity: '0' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'scale(0.9)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        bounceIn: {
                            '0%': { opacity: '0', transform: 'scale(0.3)' },
                            '50%': { opacity: '1', transform: 'scale(1.05)' },
                            '70%': { transform: 'scale(0.95)' },
                            '100%': { transform: 'scale(1)' },
                        },
                    },
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-primary: #12080a;
            --card-bg: #1f1418;
            --accent: #ff6b8b;
            --accent-light: #f3a6c0;
            --text-primary: #fce4ec;
            --text-secondary: #d7b8c5;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* Partículas de fundo */
        .bg-particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 139, 0.08) 0%, transparent 70%);
            animation: floatParticle 8s infinite ease-in-out;
        }
        @keyframes floatParticle {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            33% { transform: translate(30px, -40px) scale(1.3); opacity: 0.7; }
            66% { transform: translate(-25px, 25px) scale(0.9); opacity: 0.3; }
        }

        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .screen-card {
            background: var(--card-bg);
            border: 1px solid rgba(243, 166, 192, 0.15);
            border-radius: 2rem;
            padding: 2.5rem 2rem;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(243,166,192,0.08) inset;
            transition: all 0.4s cubic-bezier(0.22,1,0.36,1);
            position: relative;
        }

        .title-main {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem 2rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.3s cubic-bezier(0.22,1,0.36,1);
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            white-space: nowrap;
            min-width: 100px;
        }
        .btn:active { transform: scale(0.95); }

        .btn-yes {
            background: linear-gradient(135deg, #ff6b8b 0%, #e85578 100%);
            color: #fff;
            box-shadow: 0 8px 30px rgba(255,107,139,0.35), 0 2px 8px rgba(255,107,139,0.2);
            animation: pulseGlow 2s cubic-bezier(0.4,0,0.6,1) infinite;
            font-size: 1.15rem;
            padding: 1rem 2.5rem;
        }
        .btn-yes:hover {
            box-shadow: 0 12px 40px rgba(255,107,139,0.55), 0 4px 15px rgba(255,107,139,0.35);
            transform: translateY(-2px) scale(1.03);
        }

        .btn-no {
            background: transparent;
            color: var(--text-secondary);
            border: 2px solid rgba(243,166,192,0.3);
            transition: all 0.2s ease;
        }
        .btn-no:hover {
            border-color: rgba(243,166,192,0.6);
            color: #f3a6c0;
        }
        /* Vibração ao clicar */
        .btn-no.shake {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-4px); }
        }

        .btn-advance {
            background: linear-gradient(135deg, #f3a6c0 0%, #ff6b8b 100%);
            color: #1a0f12;
            font-weight: 700;
            box-shadow: 0 6px 25px rgba(243,166,192,0.3);
        }
        .btn-confirm {
            background: linear-gradient(135deg, #ff6b8b 0%, #f3a6c0 100%);
            color: #12080a;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 1rem 2rem;
            box-shadow: 0 8px 30px rgba(255,107,139,0.4);
            width: 100%;
        }

        /* Balão de mensagem do "Não" */
        .no-message-bubble {
            position: absolute;
            background: #2b1820;
            color: #f3a6c0;
            padding: 0.8rem 1.4rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            z-index: 100;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            border: 1px solid rgba(243,166,192,0.2);
        }
        .no-message-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #2b1820;
        }

        /* Formulário */
        .form-group { margin-bottom: 1.3rem; text-align: left; }
        .form-label { display: block; font-weight: 600; font-size: 0.9rem; color: var(--accent-light); margin-bottom: 0.4rem; }
        .form-input, .form-select {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border-radius: 1rem;
            border: 2px solid rgba(243,166,192,0.2);
            background: rgba(26,15,18,0.7);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-input:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255,107,139,0.12);
        }
        .form-select {
            background-image: url("data:image/svg+xml,...");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            padding-right: 2.8rem;
        }

        .success-icon { font-size: 3.5rem; }
        .confetti-piece {
            position: fixed;
            top: -10%;
            z-index: 1000;
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
            border-radius: 3px;
        }

        .screen-hidden { display: none !important; }
        .screen-visible {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            animation: fadeIn 0.5s ease-out;
        }

        @media (max-width: 480px) {
            .screen-card { padding: 2rem 1.3rem; border-radius: 1.5rem; }
            .btn { padding: 0.8rem 1.5rem; font-size: 0.95rem; }
            .btn-yes { font-size: 1.05rem; padding: 0.9rem 2rem; }
            .title-main { font-size: 1.35rem; }
        }
    </style>
</head>
<body>

<div class="bg-particles" id="bgParticles" aria-hidden="true"></div>

<div class="main-container" id="mainContainer">

    <!-- TELA 1 -->
    <div class="screen-card screen-visible" id="screen1" style="position: relative; overflow: visible;">
        <div class="text-5xl mb-2" style="animation: float 3s ease-in-out infinite;">💌</div>
        <h1 class="title-main">
            Tenho uma pergunta<br>importante para te fazer...
        </h1>
        <p class="text-[#d7b8c5] text-base mt-1 mb-4" style="opacity: 0.9;">Responde com sinceridade, tá? 😊</p>

        <div style="display: flex; gap: 1.2rem; flex-wrap: wrap; justify-content: center; align-items: center; min-height: 60px;">
            <button class="btn btn-yes" id="btnYes">SIM ✨</button>
            <button class="btn btn-no" id="btnNo">NÃO</button>
        </div>
        <!-- Container onde as mensagens do "Não" aparecerão -->
        <div id="noMessageContainer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200;"></div>
    </div>

    <!-- TELA 2 -->
    <div class="screen-card screen-hidden" id="screen2">
        <div class="success-icon mb-2">🎉</div>
        <h2 class="title-main" style="font-size: 1.6rem;">Fico feliz em você dizer sim!</h2>
        <p class="text-[#d7b8c5] text-base mt-1 mb-4" style="opacity: 0.9;">Pensei que você ia dizer não kkkk 💖</p>
        <button class="btn btn-advance" id="btnAdvance">Avançar para os detalhes ✨</button>
    </div>

    <!-- TELA 3 -->
    <div class="screen-card screen-hidden" id="screen3">
        <div class="text-4xl mb-1">📋</div>
        <h2 class="title-main" style="font-size: 1.5rem; margin-bottom: 0.3rem;">Vamos marcar!</h2>
        <p class="text-[#d7b8c5] text-sm mb-4" style="opacity: 0.85;">Escolha os detalhes do nosso encontro 💕</p>

        <form id="dateForm" style="width: 100%; text-align: left;" onsubmit="return false;">
            <div class="form-group">
                <label class="form-label" for="datePicker">📅 Qual dia?</label>
                <input type="date" id="datePicker" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="timePicker">⏰ Que horas?</label>
                <input type="time" id="timePicker" class="form-input" required min="08:00" max="23:00">
            </div>
            <div class="form-group">
                <label class="form-label" for="activitySelect">🍕 O que fazer?</label>
                <select id="activitySelect" class="form-select" required>
                    <option value="" disabled selected>Selecione uma opção...</option>
                    <option value="Jantar em um lugar legal">🍽️ Jantar em um lugar legal</option>
                    <option value="Comer um hambúrguer">🍔 Comer um hambúrguer</option>
                    <option value="Pegar um cinema">🎬 Pegar um cinema</option>
                    <option value="Surpresa!">🎁 Surpresa!</option>
                    <option value="Tomar um sorvete e caminhar">🍦 Tomar um sorvete e caminhar</option>
                    <option value="Café e conversa boa">☕ Café e conversa boa</option>
                </select>
            </div>
            <button type="button" class="btn btn-confirm" id="btnConfirm">Confirmar Encontro! 💘</button>
        </form>
    </div>

    <!-- TELA SUCESSO -->
    <div class="screen-card screen-hidden" id="screenSuccess">
        <div class="success-icon mb-2">✅</div>
        <h2 class="title-main" style="font-size: 1.5rem;">Encontro confirmado!</h2>
        <p class="text-[#d7b8c5] text-base mt-1 mb-1" style="opacity: 0.9;">Redirecionando para o WhatsApp...</p>
        <div style="margin-top: 0.5rem;">
            <div style="width: 35px; height: 35px; border: 3px solid rgba(243,166,192,0.3); border-top-color: #ff6b8b; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto;" aria-label="Carregando"></div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ⚠️ SUBSTITUA PELO SEU NÚMERO DE WHATSAPP
        const SEU_NUMERO_WHATSAPP = '5561999999999'; // <-- COLOQUE AQUI

        const screen1 = document.getElementById('screen1');
        const screen2 = document.getElementById('screen2');
        const screen3 = document.getElementById('screen3');
        const screenSuccess = document.getElementById('screenSuccess');
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const btnAdvance = document.getElementById('btnAdvance');
        const btnConfirm = document.getElementById('btnConfirm');
        const datePicker = document.getElementById('datePicker');
        const timePicker = document.getElementById('timePicker');
        const activitySelect = document.getElementById('activitySelect');
        const noMessageContainer = document.getElementById('noMessageContainer');

        // Data mínima e padrão
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, '0');
        const day = String(today.getDate()).padStart(2, '0');
        datePicker.setAttribute('min', `${year}-${month}-${day}`);
        const tomorrow = new Date(today);
        tomorrow.setDate(today.getDate() + 1);
        const tomYear = tomorrow.getFullYear();
        const tomMonth = String(tomorrow.getMonth() + 1).padStart(2, '0');
        const tomDay = String(tomorrow.getDate()).padStart(2, '0');
        datePicker.value = `${tomYear}-${tomMonth}-${tomDay}`;
        timePicker.value = '19:00';

        // Lista de frases para o botão "Não"
        const frasesNao = [
            "😢 Por favor, aceitaaa...",
            "🥺 Vai, diz que sim!",
            "💔 Não faz isso comigo...",
            "😭 Eu faço café!",
            "🍕 Pensa no hambúrguer...",
            "🎬 E o cinema?",
            "🥰 Só tem SIM no coração!",
            "😅 Tenta de novo?",
            "💖 Olha nos meus olhos...",
            "✨ Prometo que vai ser legal!"
        ];

        function switchScreen(hideScreen, showScreen) {
            if (hideScreen && !hideScreen.classList.contains('screen-hidden')) {
                hideScreen.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
                hideScreen.style.opacity = '0';
                hideScreen.style.transform = 'scale(0.96)';
                setTimeout(() => {
                    hideScreen.classList.add('screen-hidden');
                    hideScreen.classList.remove('screen-visible');
                    hideScreen.style.opacity = '';
                    hideScreen.style.transform = '';
                    showScreen.classList.remove('screen-hidden');
                    showScreen.classList.add('screen-visible');
                    showScreen.style.opacity = '0';
                    showScreen.style.transform = 'scale(0.96)';
                    requestAnimationFrame(() => {
                        showScreen.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                        showScreen.style.opacity = '1';
                        showScreen.style.transform = 'scale(1)';
                    });
                    setTimeout(() => {
                        showScreen.style.transition = '';
                        showScreen.style.opacity = '';
                        showScreen.style.transform = '';
                    }, 550);
                }, 350);
            } else if (!hideScreen) {
                showScreen.classList.remove('screen-hidden');
                showScreen.classList.add('screen-visible');
                showScreen.style.opacity = '0';
                showScreen.style.transform = 'scale(0.96)';
                requestAnimationFrame(() => {
                    showScreen.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                    showScreen.style.opacity = '1';
                    showScreen.style.transform = 'scale(1)';
                });
                setTimeout(() => {
                    showScreen.style.transition = '';
                    showScreen.style.opacity = '';
                    showScreen.style.transform = '';
                }, 550);
            }
        }

        function spawnConfetti(count = 80) {
            const colors = ['#ff6b8b','#f3a6c0','#ff8fa8','#ffb3c6','#ff4770','#ffd1dc','#ffe0e6','#ffffff'];
            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti-piece');
                const size = Math.random() * 10 + 6;
                confetti.style.width = size + 'px';
                confetti.style.height = (Math.random() > 0.5 ? size : size * 1.6) + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = -(Math.random() * 20 + 5) + '%';
                confetti.style.animationDuration = (Math.random() * 2 + 2.5) + 's';
                confetti.style.animationDelay = Math.random() * 1.5 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                document.body.appendChild(confetti);
                const duration = parseFloat(confetti.style.animationDuration) + parseFloat(confetti.style.animationDelay);
                setTimeout(() => { if (confetti.parentNode) confetti.parentNode.removeChild(confetti); }, duration * 1000 + 300);
            }
        }

        // Mostra balão com frase aleatória
        function showNoMessage() {
            // Remove mensagens antigas
            noMessageContainer.innerHTML = '';

            const frase = frasesNao[Math.floor(Math.random() * frasesNao.length)];

            const bubble = document.createElement('div');
            bubble.className = 'no-message-bubble';
            bubble.textContent = frase;

            // Posiciona próximo ao botão "Não"
            const btnRect = btnNo.getBoundingClientRect();
            const containerRect = screen1.getBoundingClientRect();

            // Coordenadas relativas ao container screen1
            const left = btnRect.left - containerRect.left + (btnRect.width / 2);
            const top = btnRect.top - containerRect.top - 10; // um pouco acima do botão

            bubble.style.position = 'absolute';
            bubble.style.left = left + 'px';
            bubble.style.top = top + 'px';
            bubble.style.transform = 'translate(-50%, -100%)';

            noMessageContainer.appendChild(bubble);

            // Remove após 2 segundos
            setTimeout(() => {
                if (bubble.parentNode) bubble.remove();
            }, 2000);
        }

        // Eventos do botão "Não"
        btnNo.addEventListener('click', function(e) {
            e.preventDefault();
            // Animação de vibração
            btnNo.classList.add('shake');
            setTimeout(() => btnNo.classList.remove('shake'), 400);
            // Mostra a frase
            showNoMessage();
            // Vibração tátil se disponível
            if (navigator.vibrate) navigator.vibrate(25);
        });

        // Suporte a toque (mobile) - mesmo comportamento
        btnNo.addEventListener('touchstart', function(e) {
            // Não previne o clique, apenas adiciona vibração extra
            if (navigator.vibrate) navigator.vibrate(15);
        }, { passive: true });

        // Botão SIM
        btnYes.addEventListener('click', function() {
            spawnConfetti(100);
            setTimeout(() => {
                switchScreen(screen1, screen2);
            }, 400);
        });

        btnAdvance.addEventListener('click', function() {
            switchScreen(screen2, screen3);
            setTimeout(() => screen3.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
        });

        btnConfirm.addEventListener('click', function() {
            const selectedDate = datePicker.value;
            const selectedTime = timePicker.value;
            const selectedActivity = activitySelect.value;

            if (!selectedDate || !selectedTime || !selectedActivity) {
                [datePicker, timePicker, activitySelect].forEach(el => {
                    if (!el.value) {
                        el.style.borderColor = '#ff6b8b';
                        el.style.boxShadow = '0 0 0 4px rgba(255,107,139,0.2)';
                        setTimeout(() => {
                            el.style.borderColor = 'rgba(243,166,192,0.2)';
                            el.style.boxShadow = '';
                        }, 1500);
                    }
                });
                if (navigator.vibrate) navigator.vibrate([30,50,30]);
                return;
            }

            const [ano, mes, dia] = selectedDate.split('-');
            const formattedDate = `${dia}/${mes}/${ano}`;
            const mensagem = `Oi! Passei para confirmar nosso encontro! 🥰%0A%0A📅 *Data:* ${formattedDate}%0A⏰ *Horário:* ${selectedTime}%0A🍕 *O que vamos fazer:* ${selectedActivity}%0A%0AMal posso esperar! ✨💖`;
            const whatsappURL = `https://api.whatsapp.com/send?phone=${SEU_NUMERO_WHATSAPP}&text=${mensagem}`;

            switchScreen(screen3, screenSuccess);
            spawnConfetti(60);
            if (navigator.vibrate) navigator.vibrate([50,30,50,30,100]);
            setTimeout(() => window.open(whatsappURL, '_blank'), 1500);
        });

        // Partículas de fundo
        function createBgParticles() {
            const container = document.getElementById('bgParticles');
            for (let i = 0; i < 18; i++) {
                const particle = document.createElement('div');
                particle.className = 'bg-particle';
                const size = Math.random() * 180 + 60;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 90 + '%';
                particle.style.top = Math.random() * 90 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 6) + 's';
                container.appendChild(particle);
            }
        }
        createBgParticles();
